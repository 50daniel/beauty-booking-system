name: beauty-booking

services:
  postgres:
    image: postgres:16-alpine
    container_name: beauty-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beauty_booking
      POSTGRES_USER: beauty_booking
      POSTGRES_PASSWORD: beauty_booking_dev_password
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beauty_booking -d beauty_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
